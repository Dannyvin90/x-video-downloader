<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>X 视频下载器</title>
<style>
:root {
  --bg: #0d0d0d; --card: #1a1a1a; --text: #e0e0e0; --sub: #888;
  --accent: #1d9bf0; --danger: #e74c3c; --border: #2a2a2a;
  --green: #2ecc71; --warn: #f0a030;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh; padding:16px; max-width:480px; margin:0 auto;
  -webkit-tap-highlight-color:transparent;
}
.mobile-badge { text-align:center; font-size:10px; color:var(--warn); padding:4px 0 0; letter-spacing:1px; }
header { text-align:center; padding:20px 0 8px; }
header h1 { font-size:20px; font-weight:600; }
header p { color:var(--sub); font-size:13px; margin-top:4px; }
.diag-bar { text-align:center; font-size:11px; padding:0 0 12px; }
.diag-ok { color:var(--green); }
.diag-warn { color:var(--warn); }
textarea {
  width:100%; height:120px; background:var(--card); border:1px solid var(--border);
  border-radius:12px; color:var(--text); padding:14px; font-size:14px;
  font-family:monospace; resize:vertical; outline:none;
}
textarea:focus { border-color:var(--accent); }
.actions { display:flex; gap:10px; margin-top:12px; }
.btn {
  flex:1; padding:14px 0; border:none; border-radius:12px;
  font-size:15px; font-weight:600; cursor:pointer; min-height:44px; touch-action:manipulation;
}
.btn:active { opacity:0.8; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-danger { background:var(--danger); color:#fff; }
.status { text-align:center; padding:8px; font-size:13px; color:var(--sub); min-height:20px; }
.video-card {
  background:var(--card); border-radius:14px; padding:14px;
  margin-bottom:12px; display:flex; gap:12px; align-items:flex-start; position:relative;
}
.video-card.duplicate { opacity:0.5; }
.dup-badge {
  position:absolute; top:8px; right:10px; background:var(--warn);
  color:#000; font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px;
}
.video-card img {
  width:80px; height:80px; border-radius:8px; object-fit:cover; background:#222; flex-shrink:0;
}
.video-info { flex:1; min-width:0; }
.author { font-size:12px; color:var(--accent); margin-bottom:4px; }
.title { font-size:13px; line-height:1.4; word-break:break-all; }
.meta { font-size:11px; color:var(--sub); margin-top:6px; }
.video-actions { display:flex; gap:8px; margin-top:10px; }
.btn-sm {
  padding:10px 14px; border-radius:8px; font-size:12px;
  font-weight:600; border:none; cursor:pointer; min-height:38px; touch-action:manipulation;
}
.btn-sm:active { opacity:0.8; }
.btn-dl { background:var(--accent); color:#fff; }
.btn-copy { background:var(--card); color:var(--text); border:1px solid var(--border); }
.btn-dl:disabled { opacity:0.4; pointer-events:none; }
.btn-done { background:var(--green); color:#fff; pointer-events:none; }
.progress-wrap { margin-top:8px; display:none; }
.progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; border-radius:2px; }
.progress-fill.done { background:var(--green); }
.progress-fill.fail { background:var(--danger); }
.progress-text { font-size:10px; color:var(--sub); margin-top:3px; }
.batch-bar { display:flex; gap:10px; margin-top:16px; align-items:center; flex-wrap:wrap; }
.batch-bar .btn { flex:1; min-width:80px; }
.btn-del { background:var(--danger); color:#fff; }
.dup-warning { color:var(--danger); font-size:11px; margin-top:4px; font-weight:600; }
@keyframes flash-highlight { 0%,100% { box-shadow:0 0 0 0 rgba(231,76,60,0); } 50% { box-shadow:0 0 0 3px rgba(231,76,60,0.7); } }
.flash-highlight { animation:flash-highlight 0.5s ease-in-out 4; }
/* 移动端下载弹窗 */
.dl-modal-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85);
  z-index:999; display:flex; align-items:center; justify-content:center;
}
.dl-modal {
  background:var(--card); border-radius:16px; padding:24px; max-width:320px; width:90%;
  text-align:center; border:1px solid var(--border);
}
.dl-modal h3 { font-size:16px; margin-bottom:6px; }
.dl-modal p { font-size:12px; color:var(--sub); margin-bottom:12px; word-break:break-all; }
.dl-modal a {
  display:block; background:var(--accent); color:#fff; padding:14px; border-radius:10px;
  text-decoration:none; font-size:14px; font-weight:700; margin-bottom:8px; word-break:break-all;
}
.dl-modal .ios-tip { font-size:11px; color:var(--warn); margin-bottom:10px; display:none; }
.dl-modal .btn-close { background:var(--border); color:var(--text); padding:12px; border-radius:10px; font-size:14px; border:none; width:100%; cursor:pointer; font-weight:600; }
</style>
</head>
<body>

<div class="mobile-badge">手机浏览器版 v1.07</div>
<header>
  <h1>X 视频下载器</h1>
  <p>粘贴链接，一键下载到电脑</p>
</header>
<div class="diag-bar" id="diagInfo"><span class="diag-ok">浏览器模式</span></div>

<textarea id="input" placeholder="粘贴 X 视频链接，每行一个&#10;例如：https://x.com/user/status/123456"></textarea>

<div class="actions">
  <button class="btn btn-secondary" id="pasteBtn">粘贴</button>
  <button class="btn btn-secondary" id="clearBtn">清空</button>
</div>
<div class="actions">
  <button class="btn btn-primary" id="parseBtn">解析</button>
</div>

<div class="status" id="status"></div>
<div id="results"></div>

<!-- 下载弹窗 -->
<div class="dl-modal-overlay" id="dlModal" style="display:none">
  <div class="dl-modal">
    <h3>视频已就绪</h3>
    <p id="dlFilename"></p>
    <a id="dlLink" href="#" download="">下载视频</a>
    <div class="ios-tip" id="dlIosTip">iOS 用户：长按上方按钮 →「下载链接文件」</div>
    <button class="btn-close" id="dlModalClose">关闭</button>
  </div>
</div>

<script>
var API = 'https://api.fxtwitter.com';
var batchAbort = false;
var downloadedIds = {};

try {
  var saved = localStorage.getItem('x_downloaded_ids');
  if (saved) {
    var arr = JSON.parse(saved);
    for (var i = 0; i < arr.length; i++) downloadedIds[arr[i]] = true;
  }
} catch(e) {}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function parseTweetUrl(url) {
  var m = url.match(/(?:twitter\.com|x\.com)\/([^/]+)\/status\/(\d+)/);
  return m ? { user: m[1], id: m[2] } : null;
}

// 事件代理
document.getElementById('results').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.getAttribute('data-action');
  if (action === 'download') {
    triggerDownload(
      btn.getAttribute('data-vid'),
      btn.getAttribute('data-url'),
      btn.getAttribute('data-filename')
    );
  } else if (action === 'copy') {
    copyLink(btn.getAttribute('data-url'));
  } else if (action === 'delete') {
    deleteCard(btn.getAttribute('data-vid'));
  }
});

function triggerDownload(vid, url, filename) {
  var btn = document.getElementById(vid + '_btn');
  var wrap = document.getElementById(vid + '_prog');
  var text = document.getElementById(vid + '_ptext');

  if (btn) { btn.textContent = '发起中...'; btn.disabled = true; }
  if (wrap) wrap.style.display = 'block';
  if (text) text.textContent = '正在启动下载...';

  // 移动端：fetch → Blob → URL.createObjectURL
  fetch(url, { mode: 'cors' }).then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var total = parseInt(resp.headers.get('content-length') || '0');
    var reader = resp.body.getReader();
    var chunks = [];
    var loaded = 0;

    function pump() {
      return reader.read().then(function(result) {
        if (result.done) {
          var blob = new Blob(chunks);
          var blobUrl = URL.createObjectURL(blob);
          if (btn) { btn.textContent = '已完成'; btn.className = 'btn-sm btn-done'; }
          if (wrap) wrap.style.display = 'none';
          if (text) text.textContent = '';
          updateProgress(vid, 100, '下载完成');
          showDownloadModal(blobUrl, filename);
          return;
        }
        chunks.push(result.value);
        loaded += result.value.length;
        if (total > 0) {
          updateProgressUI(vid, Math.round(loaded / total * 100), Math.round(loaded / total * 100) + '%');
        }
        return pump();
      });
    }
    return pump();
  }).catch(function(err) {
    updateProgressUI(vid, -1, '下载失败: ' + err.message);
    if (btn) { btn.textContent = '重试'; btn.className = 'btn-sm btn-dl'; btn.disabled = false; }
  });
}

function showDownloadModal(blobUrl, filename) {
  var modal = document.getElementById('dlModal');
  var link = document.getElementById('dlLink');
  var nameEl = document.getElementById('dlFilename');
  var iosTip = document.getElementById('dlIosTip');
  var closeBtn = document.getElementById('dlModalClose');

  nameEl.textContent = filename;
  link.href = blobUrl;
  link.download = filename;
  link.textContent = '下载 ' + filename;
  iosTip.style.display = /iPad|iPhone|iPod/.test(navigator.userAgent) ? 'block' : 'none';
  modal.style.display = 'flex';

  closeBtn.onclick = function() { modal.style.display = 'none'; };
  modal.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
}

function updateProgress(vid, percent, status) {
  updateProgressUI(vid, percent, status);
  if (percent === 100) {
    downloadedIds[vid] = true;
    var keys = [];
    for (var k in downloadedIds) if (downloadedIds[k]) keys.push(k);
    try { localStorage.setItem('x_downloaded_ids', JSON.stringify(keys)); } catch(e) {}
  }
}

function updateProgressUI(vid, percent, statusText) {
  var wrap = document.getElementById(vid + '_prog');
  var fill = document.getElementById(vid + '_fill');
  var text = document.getElementById(vid + '_ptext');
  var btn = document.getElementById(vid + '_btn');

  if (wrap) wrap.style.display = 'block';
  if (fill) {
    fill.style.width = Math.abs(percent) + '%';
    fill.className = 'progress-fill' + (percent === 100 ? ' done' : percent < 0 ? ' fail' : '');
  }
  if (text) text.textContent = statusText;
  if (btn) {
    if (percent === 100) {
      btn.textContent = '已完成';
      btn.className = 'btn-sm btn-done';
    } else if (percent < 0) {
      btn.textContent = '重试';
      btn.className = 'btn-sm btn-dl';
      btn.disabled = false;
    } else {
      btn.textContent = '下载中';
      btn.className = 'btn-sm btn-done';
    }
  }
}

function makeCard(vid, author, text, resolution, thumb, isDup, url, filename) {
  var cls = 'video-card' + (isDup ? ' duplicate' : '');
  var badge = isDup ? '<span class="dup-badge">已下载</span>' : '';
  var img = thumb ? '<img src="' + thumb + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';
  return '<div class="' + cls + '" id="' + vid + '">' + badge + img +
    '<div class="video-info">' +
    '<div class="author">@' + author + '</div>' +
    '<div class="title">' + text + '</div>' +
    '<div class="meta">' + resolution + ' &middot; <span id="' + vid + '_size">...</span></div>' +
    '<div class="video-actions">' +
    '<button class="btn-sm btn-dl" id="' + vid + '_btn" data-action="download" data-vid="' + vid + '" data-url="' + url.replace(/"/g,'&quot;') + '" data-filename="' + filename + '">下载</button>' +
    '<button class="btn-sm btn-copy" data-action="copy" data-url="' + url.replace(/"/g,'&quot;') + '">复制地址</button>' +
    '<button class="btn-sm btn-del" data-action="delete" data-vid="' + vid + '">删除</button>' +
    '</div>' +
    '<div class="progress-wrap" id="' + vid + '_prog">' +
    '<div class="progress-bar"><div class="progress-fill" id="' + vid + '_fill"></div></div>' +
    '<div class="progress-text" id="' + vid + '_ptext"></div>' +
    '</div></div></div>';
}

async function parseLinks() {
  var raw = document.getElementById('input').value.trim();
  if (!raw) { setStatus('请粘贴链接'); return; }

  var urls = raw.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);

  // 只移除已完成下载的视频卡片，保留未完成项
  var results = document.getElementById('results');
  var cards = results.querySelectorAll('.video-card');
  for (var c = 0; c < cards.length; c++) {
    var doneBtn = cards[c].querySelector('.btn-done');
    if (doneBtn && doneBtn.textContent.trim() === '已完成') {
      cards[c].remove();
    }
  }
  batchAbort = false;
  setStatus('正在解析 ' + urls.length + ' 个链接...');

  var count = 0;
  for (var i = 0; i < urls.length; i++) {
    var parsed = parseTweetUrl(urls[i]);
    if (!parsed) {
      document.getElementById('results').insertAdjacentHTML('beforeend', '<div class="video-card"><div class="video-info"><span style="color:var(--danger)">无效链接</span></div></div>');
      continue;
    }
    var vid = 'v_' + parsed.id;
    try {
      var resp = await fetch(API + '/' + parsed.user + '/status/' + parsed.id);
      if (!resp.ok) {
        document.getElementById('results').insertAdjacentHTML('beforeend', '<div class="video-card"><div class="video-info"><span style="color:var(--danger)">推文不存在</span></div></div>');
        continue;
      }
      var data = await resp.json();
      var tweet = data.tweet;
      if (!tweet || !tweet.media || !tweet.media.videos || !tweet.media.videos.length) {
        document.getElementById('results').insertAdjacentHTML('beforeend', '<div class="video-card"><div class="video-info"><span style="color:var(--sub)">不含视频</span></div></div>');
        continue;
      }

      var author = (tweet.author && tweet.author.screen_name) || parsed.user;
      var text = (tweet.text || '').slice(0, 80);
      var thumb = '';
      if (tweet.media.photos && tweet.media.photos.length) thumb = tweet.media.photos[0].url + '?name=thumb';
      else if (tweet.media.videos.length) thumb = tweet.media.videos[0].thumbnail_url || '';

      var best = tweet.media.videos[tweet.media.videos.length - 1];
      var resolution = (best.width || '?') + '\u00d7' + (best.height || '?');
      var filename = (author + '_' + text.slice(0,40)).replace(/[<>:"/\\|?*]/g, '_') + '.mp4';

      // 重复检测
      var existing = document.getElementById(vid);
      if (existing) {
        var warnDiv = existing.querySelector('.dup-warning');
        if (!warnDiv) {
          warnDiv = document.createElement('div');
          warnDiv.className = 'dup-warning';
          warnDiv.textContent = '该链接已存在';
          var actionsDiv = existing.querySelector('.video-actions');
          if (actionsDiv) {
            actionsDiv.parentNode.insertBefore(warnDiv, actionsDiv);
          }
        }
        existing.classList.add('flash-highlight');
        setTimeout(function(){ existing.classList.remove('flash-highlight'); }, 2000);
        continue;
      }

      document.getElementById('results').insertAdjacentHTML('beforeend', makeCard(vid, author, text, resolution, thumb, !!downloadedIds[vid], best.url, filename));
      count++;

      (function(elId, vurl){
        fetch(vurl, { method: 'HEAD', mode: 'cors' }).then(function(r){
          var cl = r.headers.get('content-length');
          if (cl) {
            var mb = parseInt(cl) / 1048576;
            var el = document.getElementById(elId);
            if (el) el.textContent = mb >= 1 ? mb.toFixed(1) + ' MB' : (parseInt(cl)/1024).toFixed(0) + ' KB';
          }
        }).catch(function(){});
      })(vid + '_size', best.url);

    } catch (e) {
      document.getElementById('results').insertAdjacentHTML('beforeend', '<div class="video-card"><div class="video-info"><span style="color:var(--warn)">网络不通: 请确认代理已正常启动</span></div></div>');
    }
  }
  setStatus(count > 0 ? '找到 ' + count + ' 个视频' : '未找到视频');

  if (count > 0) {
    if (!document.getElementById('batchControls')) {
      var bar = document.createElement('div');
      bar.className = 'batch-bar';
      bar.id = 'batchControls';
      bar.innerHTML = '<button class="btn btn-primary btn-sm" id="batchDlBtn">批量下载</button>' +
        '<button class="btn btn-danger btn-sm" id="cancelBtn" style="display:none">取消</button>';
      document.getElementById('results').insertBefore(bar, document.getElementById('results').firstChild);
    }
  }
}

document.getElementById('parseBtn').addEventListener('click', parseLinks);
document.getElementById('pasteBtn').addEventListener('click', async function(){
  try {
    if (navigator.clipboard && navigator.clipboard.readText) {
      var text = await navigator.clipboard.readText();
      if (text) {
        var input = document.getElementById('input');
        var old = input.value;
        if (old.length > 0 && old.charAt(old.length - 1) !== '\n') old += '\n';
        input.value = old + text.trim() + '\n';
        setStatus('已粘贴');
        return;
      }
    }
  } catch(e) {}
  setStatus('粘贴失败，请手动粘贴');
});
document.getElementById('clearBtn').addEventListener('click', function(){
  document.getElementById('input').value = '';
});

// 批量操作
document.getElementById('results').addEventListener('click', function(e){
  if (e.target.id === 'batchDlBtn') {
    batchAbort = false;
    var cb = document.getElementById('cancelBtn');
    if (cb) cb.style.display = 'inline-block';
    e.target.textContent = '下载中...';

    var cards = document.querySelectorAll('.video-card .btn-dl:not([disabled]):not(.btn-done)');
    if (cards.length === 0) { setStatus('没有可下载的视频'); return; }
    setStatus('批量下载 ' + cards.length + ' 个');

    var i = 0;
    function next() {
      if (batchAbort || i >= cards.length) {
        if (cb) cb.style.display = 'none';
        e.target.textContent = '批量下载';
        setStatus(batchAbort ? '已取消' : '已触发');
        batchAbort = false;
        return;
      }
      cards[i].click();
      i++;
      setTimeout(next, 400);
    }
    next();
  } else if (e.target.id === 'cancelBtn') {
    batchAbort = true;
  }
});

function copyLink(url) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url);
    setStatus('已复制');
  }
}

function deleteCard(vid) {
  var card = document.getElementById(vid);
  if (!card) return;
  card.remove();
}
</script>
</body>
</html>
